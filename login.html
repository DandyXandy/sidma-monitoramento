<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDMA — Acesso Administrativo</title>
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="split-container">
        
        <div class="visual-panel">
            <div class="overlay-grid"></div>
            
            <div class="security-scanner"></div>
            
            <div class="visual-content">
                <a href="index.html" class="back-home-btn"><i class="fas fa-arrow-left"></i> Voltar à Home</a>
                
                <div class="telemetry-box">
                    <span class="status-badge"><i class="fas fa-shield-halved"></i> TERMINAL SEGURO</span>
                    <h2>Painel de Controle SIDMA</h2>
                    <p>Área restrita para analistas ambientais, fiscais de campo e administradores do sistema de monitoramento da Amazônia.</p>
                </div>
            </div>
        </div>

        <div class="form-panel" style="justify-content: center; align-items: center;">
            <div class="login-wrapper-box">
                
                <form class="denuncia-form-core" id="formLoginAdm" autocomplete="off">
                    <div class="login-header-group">
                        <h2>Autenticação</h2>
                        <br><br>
                        <p class="form-subtitle">Insira suas credenciais de acesso para entrar no painel.</p>
                    </div>

                    <div class="input-group">
                        <label for="loginUser"><i class="fas fa-user-tag"></i> Credencial ou Matrícula</label>
                        <input type="text" id="loginUser" placeholder="Ex: ADM-12345" required>
                    </div>

                    <div class="input-group">
                        <label for="loginPassword"><i class="fas fa-key"></i> Senha de Acesso</label>
                        <div class="location-wrapper">
                            <input type="password" id="loginPassword" placeholder="••••••••••••" style="cursor: text;" required>
                            <button type="button" id="btnTogglePassword" title="Mostrar/Esconder senha">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="login-meta">
                        <a href="#" class="forgot-link" id="btnEsqueciSenha">Esqueceu sua senha?</a>
                    </div>

                    <button type="submit" class="btn-submit-denuncia">
                        <i class="fas fa-right-to-bracket"></i> Acessar Painel
                    </button>
                </form>

            </div>
        </div>

    </div>

    <div id="globalToast" class="toast">
        <i class="fas fa-circle-info" style="color: #00e676; font-size: 1.8rem;"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
